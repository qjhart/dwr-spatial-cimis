services:
  db:
    image: us-west1-docker.pkg.dev/digital-ucdavis-edu/pub/postgres:16
    restart: always
    environment:
      POSTGRES_PASSWORD: cimis
    volumes:
      - ./db/initdb.d:/docker-entrypoint-initdb.d
      - db:/var/lib/postgresql/data
    ports:
      - ${PORT:-5432}:5432
